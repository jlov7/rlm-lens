name: CI

on:
  push:
  pull_request:

jobs:
  check:
    # Private repos can be billing-blocked for hosted runners; skip until billing/public switch.
    if: ${{ github.event.repository.private == false || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Run checks
        run: make check

  e2e:
    if: ${{ github.event.repository.private == false || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install Playwright browser deps
        run: cd frontend && pnpm exec playwright install --with-deps chromium

      - name: Run E2E smoke and integration tests
        run: make e2e
